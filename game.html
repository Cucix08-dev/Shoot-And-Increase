<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoot and Increase - Game</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="game.css">
</head>
<body>
    <header>
        <ul>
            <li>SHOTS: <span id="shots">0</span>x</li>
            <li>TIME: <span id="time">0</span>s</li>
            <li>MONSTERS KILLED: <span id="monster-killed">0</span>x</li>
            <li>LIVES: <span id="lives">5</span>x</li>
        </ul>
    </header>
    <main id="game">
        <div id="start" class="button">START</div>
        <div id="timer"></div>
    </main>
    <script src="game.js"></script>
</body>
</html>
